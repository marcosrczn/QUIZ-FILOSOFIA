<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiloQuiz - 2ª Série (1º Trimestre)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #46178f;
            color: white;
            overflow-x: hidden;
        }

        .kahoot-btn {
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .kahoot-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .option-red { background-color: #e21b3c; border-bottom: 4px solid #a31027; }
        .option-blue { background-color: #1368ce; border-bottom: 4px solid #0a4a96; }
        .option-yellow { background-color: #d89e00; border-bottom: 4px solid #9e7300; }
        .option-green { background-color: #26890c; border-bottom: 4px solid #1a5e08; }

        .timer-container {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 8px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            background: rgba(0,0,0,0.2);
        }

        .screen { display: none; }
        .screen.active { display: flex; }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="screen-home" class="screen active min-h-screen flex-col items-center justify-center p-4">
        <div class="text-center mb-8 animate-pop">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter shadow-sm">FiloQuiz!</h1>
            <p class="text-purple-200 font-bold uppercase tracking-widest mt-2">Plataforma de Revisão - 2ª Série</p>
        </div>
        
        <div class="bg-white text-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-2xl border-b-[12px] border-gray-200">
            <h2 class="text-2xl font-black mb-6 text-purple-900 flex items-center gap-2">
                <i class="fa-solid fa-gears"></i> Painel do Professor
            </h2>
            
            <div class="mb-6">
                <label class="block font-black mb-2 text-gray-500 uppercase text-xs tracking-wider">Registrar Equipes:</label>
                <div class="flex gap-2">
                    <input type="text" id="group-input" placeholder="Nome da Equipe..." class="flex-1 p-4 bg-gray-100 border-2 border-transparent rounded-xl focus:border-purple-500 outline-none transition-all font-bold">
                    <button onclick="addGroup()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-black hover:bg-purple-700 transition-all shadow-md">ADD</button>
                </div>
                <div id="groups-list" class="flex flex-wrap gap-2 mt-4"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block font-black mb-2 text-gray-500 uppercase text-xs tracking-wider">Questões p/ Equipe:</label>
                    <input type="number" id="quest-count" value="10" min="1" max="120" class="w-full p-4 bg-gray-100 rounded-xl font-bold outline-none focus:ring-2 focus:ring-purple-400">
                </div>
                <div>
                    <label class="block font-black mb-2 text-gray-500 uppercase text-xs tracking-wider">Segundos p/ Resposta:</label>
                    <input type="number" id="timer-setting" value="30" min="5" max="120" class="w-full p-4 bg-gray-100 rounded-xl font-bold outline-none focus:ring-2 focus:ring-purple-400">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block font-black mb-2 text-gray-500 uppercase text-xs tracking-wider">Nota de Participação Máxima:</label>
                    <input type="number" id="participation-grade" value="1.00" step="0.05" class="w-full p-4 bg-gray-50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:ring-2 focus:ring-purple-400 text-purple-800">
                </div>
                <div>
                    <label class="block font-black mb-2 text-gray-500 uppercase text-xs tracking-wider">Meta de Acertos (Mínimo):</label>
                    <input type="number" id="target-hits" value="5" min="1" class="w-full p-4 bg-gray-50 border-2 border-purple-100 rounded-xl font-bold outline-none focus:ring-2 focus:ring-purple-400 text-purple-800">
                </div>
            </div>

            <button onclick="startGame()" id="btn-start" class="w-full bg-green-500 text-white py-5 rounded-2xl text-3xl font-black kahoot-btn uppercase disabled:opacity-50 tracking-tight" disabled>
                Iniciar Desafio
            </button>
        </div>
    </div>

    <!-- TELA DE JOGO -->
    <div id="screen-game" class="screen min-h-screen flex-col p-4 md:p-8">
        <div class="flex justify-between items-center mb-6 w-full max-w-6xl mx-auto">
            <div class="flex flex-col gap-2">
                <div class="text-xl font-black bg-white/20 px-6 py-3 rounded-2xl backdrop-blur-md">
                    <i class="fa-solid fa-users mr-2 text-yellow-300"></i> <span id="current-group-display">---</span>
                </div>
                <div class="text-sm font-black bg-black/20 px-4 py-1 rounded-full w-fit">
                    ITEM <span id="q-counter">0/0</span>
                </div>
            </div>

            <div class="flex flex-col items-center gap-3">
                <div class="timer-container" id="timer-ui">
                    <span id="timer-text">30</span>
                </div>
                <button onclick="showHint()" class="bg-yellow-400 text-gray-900 px-6 py-2 rounded-full font-black text-xs uppercase shadow-xl hover:scale-105 transition-all">
                    <i class="fa-solid fa-lightbulb"></i> Ver Dica
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center max-w-5xl mx-auto w-full">
            <div class="bg-white text-gray-800 p-10 rounded-[2rem] shadow-2xl w-full mb-8 min-h-[250px] flex items-center justify-center text-center relative overflow-hidden">
                <h2 id="question-text" class="text-2xl md:text-3xl font-black leading-snug z-10">...</h2>
                <div id="time-progress" class="absolute bottom-0 left-0 h-3 bg-red-500 transition-all duration-1000" style="width: 100%"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <button id="btn-opt-0" class="option-red p-8 rounded-2xl text-left relative flex items-center kahoot-btn min-h-[120px]">
                    <i class="fa-solid fa-square-full rotate-45 mr-6 text-2xl opacity-50"></i>
                    <span id="opt-text-0" class="text-xl font-black leading-tight">...</span>
                </button>
                <button id="btn-opt-1" class="option-blue p-8 rounded-2xl text-left relative flex items-center kahoot-btn min-h-[120px]">
                    <i class="fa-solid fa-diamond mr-6 text-3xl opacity-50"></i>
                    <span id="opt-text-1" class="text-xl font-black leading-tight">...</span>
                </button>
                <button id="btn-opt-2" class="option-yellow p-8 rounded-2xl text-left relative flex items-center kahoot-btn min-h-[120px]">
                    <i class="fa-solid fa-circle mr-6 text-3xl opacity-50"></i>
                    <span id="opt-text-2" class="text-xl font-black leading-tight">...</span>
                </button>
                <button id="btn-opt-3" class="option-green p-8 rounded-2xl text-left relative flex items-center kahoot-btn min-h-[120px]">
                    <i class="fa-solid fa-square mr-6 text-4xl opacity-50"></i>
                    <span id="opt-text-3" class="text-xl font-black leading-tight">...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL DE DICA -->
    <div id="hint-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white text-gray-800 p-10 rounded-3xl shadow-2xl max-w-xl w-full animate-pop border-t-[15px] border-yellow-400">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-600 text-3xl">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <h3 class="text-3xl font-black uppercase text-gray-500">Dica Docente</h3>
            </div>
            <p id="hint-text" class="text-xl leading-relaxed text-gray-700 mb-10 italic">...</p>
            <button onclick="closeHint()" class="w-full bg-purple-700 text-white py-5 rounded-2xl font-black text-2xl uppercase shadow-lg">Entendi!</button>
        </div>
    </div>

    <!-- TELA FEEDBACK -->
    <div id="screen-feedback" class="screen min-h-screen flex-col items-center justify-center p-4">
        <div id="feedback-card" class="bg-white text-gray-800 p-12 rounded-[3rem] shadow-2xl flex flex-col items-center animate-pop w-full max-w-lg border-b-[15px]">
            <div id="feedback-icon" class="text-9xl mb-6"></div>
            <h2 id="feedback-title" class="text-5xl font-black mb-2 text-center">...</h2>
            <p id="feedback-score" class="text-3xl font-black text-purple-600 mb-10 text-center">...</p>
            <button onclick="nextStep()" class="w-full bg-blue-600 text-white py-5 rounded-2xl text-2xl font-black kahoot-btn uppercase">Continuar</button>
        </div>
    </div>

    <!-- TELA RANKING FINAL -->
    <div id="screen-ranking" class="screen min-h-screen flex-col items-center justify-center p-4">
        <h2 class="text-7xl font-black mb-10 italic tracking-tighter text-center animate-pop">Pódio Final</h2>
        <div id="ranking-container" class="bg-white text-gray-800 p-8 rounded-[2rem] shadow-2xl w-full max-w-2xl"></div>
        <button onclick="location.reload()" class="mt-10 bg-yellow-500 text-white px-12 py-5 rounded-2xl text-2xl font-black kahoot-btn uppercase shadow-xl">Menu Inicial</button>
    </div>

    <script>
        // GERADOR DE QUESTÕES ÚNICAS
        // Combina prefixos e estruturas para garantir que cada questão seja textual e logicamente única.
        
        const subjects = [
            { 
                theme: "Natureza e Cultura", 
                correct: "A cultura transforma a natureza através do trabalho e símbolos.", 
                options: ["A natureza é imutável e a cultura é passageira.", "Ambas são idênticas na prática social.", "A cultura não depende da natureza biológica."],
                hint: "Pense na ação humana sobre o meio."
            },
            {
                theme: "Etnocentrismo",
                correct: "Julgar outras culturas baseado nos valores da sua própria cultura.",
                options: ["Aceitar todas as formas de vida sem julgamento.", "Valorizar o estrangeiro acima do nacional.", "Estudar cientificamente sem preconceitos."],
                hint: "Ocorre quando colocamos nosso grupo no centro."
            },
            {
                theme: "Multiculturalismo",
                correct: "Coexistência de diversas culturas em um mesmo espaço social.",
                options: ["Imposição de uma cultura única sobre as outras.", "Isolamento total de grupos diferentes.", "Eliminação das diferenças culturais."],
                hint: "Multi = muitos; Culturalismo = culturas."
            },
            {
                theme: "Aculturação",
                correct: "Fusão ou alteração cultural decorrente do contato entre grupos.",
                options: ["Preservação intacta das tradições ancestrais.", "Nascimento biológico em uma nova cultura.", "Rejeição total de tecnologias estrangeiras."],
                hint: "Pense no choque e mistura de culturas."
            },
            {
                theme: "Identidade Social",
                correct: "Sentimento de pertencimento a um determinado grupo social.",
                options: ["Características genéticas individuais exclusivas.", "Número do documento de identidade civil.", "Isolamento do indivíduo da sociedade."],
                hint: "É como 'nós' nos vemos em relação aos 'outros'."
            },
            {
                theme: "Geofilosofia",
                correct: "Relação entre o pensamento filosófico e o território/espaço.",
                options: ["Estudo das rochas e minerais do solo.", "Filosofia que ignora fronteiras geográficas.", "Análise puramente temporal da história."],
                hint: "Geo (terra/espaço) + Filosofia."
            },
            {
                theme: "Pensamento Decolonial",
                correct: "Crítica à hegemonia do conhecimento eurocêntrico.",
                options: ["Defesa da colonização como processo civilizatório.", "Aceitação passiva da história oficial europeia.", "Fim do estudo de autores estrangeiros."],
                hint: "De-colonizar: desfazer a lógica colonial."
            },
            {
                theme: "Cultura de Massa",
                correct: "Produção cultural industrializada para consumo em larga escala.",
                options: ["Tradições passadas oralmente de pai para filho.", "Arte erudita restrita a museus e galerias.", "Folclore local de pequenas comunidades."],
                hint: "Feita para vender para multidões (massa)."
            },
             {
                theme: "Alteridade",
                correct: "Reconhecimento do outro como um ser legítimo e diferente.",
                options: ["Visão de que todos são iguais e idênticos.", "Medo e rejeição de quem é diferente.", "Tentativa de tornar o outro igual a mim."],
                hint: "Alter = Outro. Colocar-se no lugar dele."
            },
            {
                theme: "Folclore",
                correct: "Manifestações culturais tradicionais e populares de um povo.",
                options: ["Produtos vendidos em supermercados globais.", "Leis escritas na constituição federal.", "Tecnologias digitais de última geração."],
                hint: "Saber do povo, lendas, danças."
            }
        ];

        const prefixes = [
            "No contexto da filosofia, ", "Sociologicamente falando, ", "Ao analisar a sociedade, ", 
            "Historicamente, ", "Em relação aos estudos culturais, ", "Considerando a antropologia, ",
            "Na perspectiva contemporânea, ", "Segundo a crítica social, ", "No debate acadêmico, ",
            "Para compreender o mundo atual, ", "Do ponto de vista ético, ", "Na formação da identidade, "
        ];

        const questionsDatabase = [];

        // GERAÇÃO DE 120 QUESTÕES ÚNICAS
        // Loop principal para criar variações sem repetição textual
        for (let i = 0; i < 120; i++) {
            const subject = subjects[i % subjects.length];
            const prefix = prefixes[i % prefixes.length];
            
            // Variação no enunciado para garantir que sejam strings diferentes
            let questionText = "";
            if (i < 40) {
                questionText = `${prefix}como podemos definir o conceito de '${subject.theme}'?`;
            } else if (i < 80) {
                questionText = `${prefix}qual a melhor descrição para o fenômeno de '${subject.theme}'?`;
            } else {
                questionText = `${prefix}o termo '${subject.theme}' refere-se primordialmente a:`;
            }

            questionsDatabase.push({
                id: i, // ID único
                q: questionText,
                options: [subject.correct, ...subject.options],
                correct: subject.correct,
                hint: subject.hint
            });
        }

        let groups = [];
        let config = { 
            questionsPerGroup: 10, 
            timerSeconds: 30,
            participationValue: 1.0,
            targetHits: 5
        };
        let currentGroupIndex = 0;
        let currentQuestionIndex = 0;
        let gameQuestions = [];
        let scores = {};
        let timeLeft = 0;
        let timerInterval = null;

        function addGroup() {
            const input = document.getElementById('group-input');
            const name = input.value.trim();
            if (name && !groups.includes(name)) {
                groups.push(name);
                scores[name] = 0;
                renderGroups();
                input.value = '';
                document.getElementById('btn-start').disabled = false;
            }
        }

        function renderGroups() {
            const list = document.getElementById('groups-list');
            list.innerHTML = groups.map(g => `
                <span class="bg-purple-100 text-purple-900 px-5 py-3 rounded-2xl font-black flex items-center gap-3 border-2 border-purple-200 animate-pop">
                    ${g} <i class="fa-solid fa-xmark cursor-pointer text-red-500" onclick="removeGroup('${g}')"></i>
                </span>
            `).join('');
        }

        function removeGroup(name) {
            groups = groups.filter(g => g !== name);
            delete scores[name];
            renderGroups();
            if (groups.length === 0) document.getElementById('btn-start').disabled = true;
        }

        function startGame() {
            config.questionsPerGroup = parseInt(document.getElementById('quest-count').value) || 10;
            config.timerSeconds = parseInt(document.getElementById('timer-setting').value) || 30;
            config.participationValue = parseFloat(document.getElementById('participation-grade').value) || 1.0;
            config.targetHits = parseInt(document.getElementById('target-hits').value) || 5;

            currentGroupIndex = 0;
            currentQuestionIndex = 0;
            
            // --- LÓGICA DE EXCLUSIVIDADE DE QUESTÕES ---
            // 1. Embaralha todo o banco de dados de 120 questões únicas
            const shuffledDB = shuffleArray([...questionsDatabase]);
            
            // 2. Verifica se há questões suficientes para todos os grupos
            const totalNeeded = config.questionsPerGroup * groups.length;
            if (totalNeeded > shuffledDB.length) {
                alert(`Atenção: Você pediu ${totalNeeded} questões únicas, mas o banco só tem ${shuffledDB.length}. Algumas podem se repetir.`);
            }

            // 3. Seleciona a fatia necessária para o jogo todo
            gameQuestions = shuffledDB.slice(0, totalNeeded);
            
            showScreen('screen-game');
            loadQuestion();
        }

        // Algoritmo de Fisher-Yates para embaralhamento perfeito
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadQuestion() {
            const groupName = groups[currentGroupIndex];
            
            // Cálculo do índice global baseado no grupo atual
            // Como gameQuestions é uma lista única embaralhada, cada bloco pertence a um grupo
            const qIndex = (currentGroupIndex * config.questionsPerGroup) + currentQuestionIndex;
            
            // Segurança contra estouro de índice
            if (qIndex >= gameQuestions.length) {
                finishGame();
                return;
            }

            const qData = gameQuestions[qIndex];

            document.getElementById('current-group-display').innerText = groupName;
            document.getElementById('q-counter').innerText = `${currentQuestionIndex + 1}/${config.questionsPerGroup}`;
            document.getElementById('question-text').innerText = qData.q;
            
            let displayOptions = shuffleArray([...qData.options]);

            displayOptions.forEach((opt, i) => {
                const span = document.getElementById(`opt-text-${i}`);
                const btn = document.getElementById(`btn-opt-${i}`);
                if (span) span.innerText = opt;
                if (btn) {
                    btn.onclick = () => checkAnswer(opt === qData.correct);
                }
            });

            startTimer();
        }

        function startTimer() {
            timeLeft = config.timerSeconds;
            updateTimerUI();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showFeedback("timeout");
                }
            }, 1000);
        }

        function updateTimerUI() {
            const text = document.getElementById('timer-text');
            const progress = document.getElementById('time-progress');
            text.innerText = timeLeft;
            const percentage = (timeLeft / config.timerSeconds) * 100;
            progress.style.width = percentage + "%";
            if(timeLeft <= 5) text.parentElement.classList.add('border-red-500', 'text-red-500', 'animate-pulse');
            else text.parentElement.classList.remove('border-red-500', 'text-red-500', 'animate-pulse');
        }

        function checkAnswer(isCorrect) {
            clearInterval(timerInterval);
            if (isCorrect) {
                scores[groups[currentGroupIndex]] += 1;
                showFeedback("correct");
            } else {
                showFeedback("wrong");
            }
        }

        function showFeedback(status) {
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const scoreDisp = document.getElementById('feedback-score');
            const card = document.getElementById('feedback-card');

            const gradePerHit = config.participationValue / config.questionsPerGroup;

            if (status === "correct") {
                icon.innerHTML = '🥇';
                title.innerText = 'Excelente!';
                title.className = 'text-5xl font-black mb-2 text-green-600';
                scoreDisp.innerText = `+${gradePerHit.toFixed(2)} na nota`;
                card.style.borderColor = "#26890c";
            } else if (status === "timeout") {
                icon.innerHTML = '⏳';
                title.innerText = 'Tempo Esgotado!';
                title.className = 'text-4xl font-black mb-2 text-orange-500';
                scoreDisp.innerText = '0,00 na nota';
                card.style.borderColor = "#f39c12";
            } else {
                icon.innerHTML = '🤔';
                title.innerText = 'Que Pena!';
                title.className = 'text-5xl font-black mb-2 text-red-600';
                scoreDisp.innerText = '0,00 na nota';
                card.style.borderColor = "#e21b3c";
            }
            showScreen('screen-feedback');
        }

        function nextStep() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= config.questionsPerGroup) {
                currentQuestionIndex = 0;
                currentGroupIndex++;
            }
            if (currentGroupIndex >= groups.length) finishGame();
            else { showScreen('screen-game'); loadQuestion(); }
        }

        function showHint() {
            const qIndex = (currentGroupIndex * config.questionsPerGroup) + currentQuestionIndex;
            const qData = gameQuestions[qIndex];
            document.getElementById('hint-text').innerText = qData.hint;
            document.getElementById('hint-modal').classList.remove('hidden');
        }

        function closeHint() { document.getElementById('hint-modal').classList.add('hidden'); }

        function finishGame() {
            showScreen('screen-ranking');
            const container = document.getElementById('ranking-container');
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            
            const pointsPerHit = config.participationValue / config.questionsPerGroup;

            container.innerHTML = sorted.map(([name, score], i) => {
                const hits = score;
                const earnedGrade = (hits * pointsPerHit).toFixed(2);
                const goalStatus = hits >= config.targetHits ? 'Mínimo atingido!' : `Abaixo da meta (${hits}/${config.targetHits})`;

                return `
                <div class="flex justify-between items-center p-6 ${i === 0 ? 'bg-yellow-50 border-yellow-400' : 'bg-gray-50 border-gray-100'} rounded-2xl mb-4 border-2 animate-pop">
                    <div class="flex items-center">
                        <span class="text-4xl font-black mr-6 ${i === 0 ? 'text-yellow-600' : 'text-gray-300'}">#${i + 1}</span>
                        <div>
                            <span class="text-2xl font-black text-gray-700 uppercase tracking-tighter block">${name}</span>
                            <span class="text-xs font-bold ${hits >= config.targetHits ? 'text-green-600' : 'text-red-400'} uppercase">
                                <i class="fa-solid ${hits >= config.targetHits ? 'fa-check-circle' : 'fa-circle-xmark'}"></i> ${goalStatus}
                            </span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-4xl font-black text-purple-700 block">${score} Acertos</span>
                        <div class="bg-purple-100 text-purple-800 text-[10px] font-black px-2 py-0.5 rounded-full inline-block">
                            NOTA: ${earnedGrade} / ${config.participationValue.toFixed(2)}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
