<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Filosofia - 3ª Série</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --correct-color: #27ae60;
            --wrong-color: #e74c3c;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
        }

        .progress-bar {
            background-color: #e0e0e0;
            border-radius: 5px;
            height: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .progress-fill {
            background-color: var(--accent-color);
            height: 100%;
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 25px;
            text-align: justify;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-btn:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }

        /* Modal / Pop-up Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #fff;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .modal-message {
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.5;
            text-align: justify;
        }

        .correct-theme .modal-icon, .correct-theme .modal-title {
            color: var(--correct-color);
        }

        .wrong-theme .modal-icon, .wrong-theme .modal-title {
            color: var(--wrong-color);
        }

        /* Botão do Modal e Estado Desativado (Timer) */
        .btn-next {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .btn-next:hover:not(:disabled) {
            background-color: var(--secondary-color);
        }

        .btn-next:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Result Screen */
        .result-container {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>

    <div class="quiz-container" id="quiz-box">
        <h1>Simulado: Filosofia</h1>
        
        <div id="quiz-content">
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
            
            <div class="status-bar">
                <span id="question-counter">Questão 1 de 50</span>
                <span id="score-counter">Acertos (1ª tentativa): 0</span>
            </div>

            <div class="question-text" id="question-text">
                Carregando pergunta...
            </div>

            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div class="result-container" id="result-content">
            <h2>Fim do Simulado!</h2>
            <div class="score-circle" id="final-score">0%</div>
            <p id="final-message" class="question-text"></p>
            <button class="btn-next" onclick="reiniciarQuiz()">Tentar Novamente</button>
        </div>
    </div>

    <div class="modal-overlay" id="feedback-modal">
        <div class="modal-content" id="modal-box">
            <div class="modal-icon" id="modal-icon">✓</div>
            <div class="modal-title" id="modal-title">Você Acertou!</div>
            <div class="modal-message" id="modal-message">Explicação aqui.</div>
            <button class="btn-next" id="modal-btn">Aguarde...</button>
        </div>
    </div>

    <script>
        const questoes = [
            {
                enunciado: "1. Durante um debate eleitoral, um candidato afirma: 'Todos os problemas econômicos do país são causados por impostos. Nosso país tem impostos. Logo, cortando impostos, não teremos mais problemas'. Do ponto de vista da lógica formal, o argumento do candidato demonstra que:",
                opcoes: [
                    "A) A estrutura do raciocínio garante que a conclusão seja inquestionavelmente verdadeira na prática.",
                    "B) A validade de um silogismo não assegura a verdade material de suas premissas no mundo real.",
                    "C) A argumentação indutiva utilizada é suficiente para resolver as crises econômicas do Estado.",
                    "D) A falácia do espantalho foi utilizada para desviar o foco da real causa das crises financeiras."
                ], correta: 1, explicacao: "A lógica formal estuda a validade da estrutura. Um argumento pode ser estruturalmente válido, mas ter premissas falsas na realidade material."
            },
            {
                enunciado: "2. O avanço da inteligência artificial generativa tem tornado a criação de vídeos hiper-realistas (deepfakes) algo acessível. Esse cenário contemporâneo nos remete diretamente à dúvida metódica de René Descartes, pois:",
                opcoes: [
                    "A) Reforça a ideia de que a experiência sensível é a única fonte segura e confiável de conhecimento.",
                    "B) Demonstra que os nossos sentidos podem ser facilmente enganados pelas tecnologias modernas.",
                    "C) Comprova que a mente humana é incapaz de formular conceitos matemáticos sem a tecnologia.",
                    "D) Sugere que a verdade absoluta só pode ser alcançada pela observação empírica da natureza."
                ], correta: 1, explicacao: "Descartes instituiu a dúvida metódica por desconfiar dos sentidos, que frequentemente nos enganam. Deepfakes são exemplos perfeitos de ilusão sensorial."
            },
            {
                enunciado: "3. Nas redes sociais, é comum o uso de filtros que alteram rosto e cenário. Muitas vezes, ao encontrar a pessoa na vida real, a aparência é diferente. Essa reflexão sobre o que é a aparência na tela e o corpo real nos leva a um questionamento da Metafísica, porque:",
                opcoes: [
                    "A) Questiona o que é genuinamente real e o que é apenas uma ilusão passageira criada para enganar sentidos.",
                    "B) Estabelece que a tecnologia de ponta é a única forma de o ser humano alcançar a beleza verdadeira.",
                    "C) Comprova que a internet eliminou a possibilidade de os jovens sofrerem com a própria imagem.",
                    "D) Proíbe o uso de aplicativos de edição para garantir que a verdade científica seja respeitada."
                ], correta: 0, explicacao: "A Metafísica investiga a natureza última da realidade. Questionar a diferença entre o real e a aparência (ilusão) é um problema clássico."
            },
            {
                enunciado: "4. Em uma rede social, um usuário critica uma teoria científica dizendo: 'O autor dessa teoria foi reprovado na escola quando criança, logo sua teoria não tem valor'. Esse comentário exemplifica a falácia ad hominem, que se caracteriza por:",
                opcoes: [
                    "A) Atacar as características pessoais do argumentador em vez de refutar o argumento em si.",
                    "B) Distorcer o argumento original para torná-lo mais fácil de ser atacado e ridicularizado.",
                    "C) Apelar para a opinião da maioria para justificar a veracidade de uma afirmação científica.",
                    "D) Utilizar uma premissa oculta que já pressupõe a conclusão que se deseja provar no final."
                ], correta: 0, explicacao: "A falácia ad hominem ocorre quando se tenta descredibilizar um argumento atacando o caráter ou o histórico de quem o defende."
            },
            {
                enunciado: "5. O filósofo John Locke afirmava que a mente humana é como uma 'tábula rasa' (folha em branco) ao nascer. Se aplicarmos essa perspectiva empirista ao funcionamento dos algoritmos de recomendação na internet, podemos concluir que:",
                opcoes: [
                    "A) O algoritmo possui ideias inatas sobre o que o usuário deseja antes de qualquer interação.",
                    "B) O perfil digital do usuário é construído inteiramente a partir das experiências e cliques dele.",
                    "C) O conhecimento gerado pela rede prescinde da coleta contínua de dados do mundo sensível.",
                    "D) A inteligência artificial utiliza deduções puramente metafísicas para prever comportamentos."
                ], correta: 1, explicacao: "Para o empirismo, todo conhecimento vem da experiência. Analogamente, o algoritmo só aprende quem é o usuário a partir de seus cliques."
            },
            {
                enunciado: "6. Na Grécia Antiga, Heráclito afirmou que 'ninguém entra no mesmo rio duas vezes', enfatizando o fluxo constante da realidade. Considerando a rápida obsolescência dos aparelhos tecnológicos, a visão de Heráclito:",
                opcoes: [
                    "A) Sustenta que a essência das coisas é estática e imutável, apesar das aparências em contrário.",
                    "B) Explica o mundo contemporâneo como um espaço onde a mudança é a única regra permanente.",
                    "C) Demonstra que o progresso técnico é uma ilusão dos sentidos que mascara a imobilidade do ser.",
                    "D) Contradiz a necessidade capitalista de inovar constantemente os meios de produção material."
                ], correta: 1, explicacao: "Heráclito é o filósofo do devir (vir a ser). A realidade atual, marcada pela inovação incessante, reflete sua teoria de mudança contínua."
            },
            {
                enunciado: "7. Um cientista realiza cem experimentos em laboratório e, em todos eles, um determinado metal se dilata ao ser aquecido. Ele conclui que 'todo metal se dilata ao ser aquecido'. Esse raciocínio baseia-se na:",
                opcoes: [
                    "A) Dedução formal, que parte de premissas universais para chegar a uma conclusão particular.",
                    "B) Intuição intelectual, que apreende a verdade de forma imediata sem o uso dos sentidos.",
                    "C) Indução lógica, que generaliza uma regra a partir da observação repetida de casos singulares.",
                    "D) Revelação mística, que dispensa a verificação empírica para validar a lei científica."
                ], correta: 2, explicacao: "A indução é o processo pelo qual partimos da observação de vários casos particulares para formular uma lei geral e universal."
            },
            {
                enunciado: "8. Kant argumentou que não conhecemos a 'coisa em si' (nóumeno), mas apenas como ela aparece para nós (fenômeno). No contexto atual, conhecendo o mundo através de interfaces digitais, a tese alerta que:",
                opcoes: [
                    "A) A tecnologia nos permite finalmente acessar a essência verdadeira e oculta da realidade.",
                    "B) Nossa percepção do mundo é sempre mediada e formatada pelas ferramentas que utilizamos.",
                    "C) Os sentidos humanos se tornaram obsoletos diante da capacidade de processamento das máquinas.",
                    "D) A realidade virtual é a única forma de conhecimento que escapa das ilusões da mente."
                ], correta: 1, explicacao: "Assim como as estruturas da mente formatam a realidade para Kant, as telas e algoritmos atuam hoje como mediadores que filtram o que vemos."
            },
            {
                enunciado: "9. A lógica aristotélica fundamenta-se no Princípio da Não-Contradição. Imagine um contrato de app que afirme simultaneamente: 'O usuário tem total privacidade' e 'A empresa pode vender os dados a terceiros'. Esse contrato:",
                opcoes: [
                    "A) Demonstra uma evolução do pensamento lógico para além das limitações da filosofia grega.",
                    "B) Viola uma regra lógica fundamental, pois duas proposições contrárias não podem ser verdadeiras.",
                    "C) Estabelece um novo paradigma ético compatível com as exigências do mercado tecnológico.",
                    "D) Valida o princípio de identidade, confirmando que os dados pertencem à empresa."
                ], correta: 1, explicacao: "O Princípio da Não-Contradição afirma que é impossível que algo seja e não seja ao mesmo tempo e sob o mesmo aspecto."
            },
            {
                enunciado: "10. Platão, na Alegoria da Caverna, descreve prisioneiros que tomam sombras por realidade. Hoje, a metáfora é frequentemente utilizada para analisar o fenômeno das 'fake news', pois estas:",
                opcoes: [
                    "A) Estimulam o pensamento crítico e a busca incessante pela verdade nos meios de comunicação.",
                    "B) Representam cópias imperfeitas da realidade que aprisionam a mente na ilusão e na ignorância.",
                    "C) São o resultado do método científico aplicado à difusão de informações nas redes sociais.",
                    "D) Libertam os indivíduos da opressão exercida pelos filósofos e pelos intelectuais acadêmicos."
                ], correta: 1, explicacao: "Fake news atuam como as sombras na parede da caverna: são aparências manipuladas que as pessoas tomam por fatos reais."
            },
            {
                enunciado: "11. A epistemologia contemporânea enfrenta o desafio da 'pós-verdade', período em que crenças pessoais e emoções têm mais influência do que fatos objetivos. Esse fenômeno afeta diretamente a ciência porque:",
                opcoes: [
                    "A) Substitui a necessidade de comprovação empírica por narrativas que geram engajamento virtual.",
                    "B) Fortalece o método experimental ao integrar as opiniões dos usuários nos resultados das pesquisas.",
                    "C) Torna o conhecimento científico acessível e inquestionável para todas as classes da sociedade.",
                    "D) Consolida o racionalismo dogmático como a única forma aceitável de debate público na internet."
                ], correta: 0, explicacao: "A pós-verdade ocorre quando o apelo emocional supera o rigor dos fatos e testes empíricos da ciência."
            },
            {
                enunciado: "12. O pensamento mítico e o filosófico divergem. Enquanto um mito explicaria uma tempestade como a fúria de um deus, um pensador pré-socrático buscaria:",
                opcoes: [
                    "A) Apaziguar os deuses por meio de rituais e sacrifícios detalhados para restaurar o equilíbrio.",
                    "B) Identificar causas naturais e racionais que explicassem a origem e a dinâmica do fenômeno.",
                    "C) Aceitar a tempestade como um mistério insondável que a mente humana jamais compreenderá.",
                    "D) Criar uma nova narrativa religiosa que justificasse a ocorrência do evento de forma poética."
                ], correta: 1, explicacao: "A transição do mito à razão (filosofia) é marcada pela busca de explicações e causas pautadas na natureza (physis) e na racionalidade."
            },
            {
                enunciado: "13. Segundo Aristóteles, tudo possui 'Ato' e 'Potência'. Aplicando esse conceito metafísico ao processo educacional de um estudante do Ensino Médio, conclui-se que a educação serve para:",
                opcoes: [
                    "A) Manter o indivíduo em seu estado de ato permanente, evitando frustrações futuras.",
                    "B) Eliminar qualquer possibilidade de mudança, garantindo a estabilidade social do país.",
                    "C) Atualizar as potências do indivíduo, transformando suas capacidades latentes em realidade.",
                    "D) Substituir a natureza intrínseca do aluno por um modelo padronizado imposto pelo Estado."
                ], correta: 2, explicacao: "A potência é aquilo que pode vir a ser. A educação atua justamente para transformar o potencial latente do aluno em realidade (ato)."
            },
            {
                enunciado: "14. Nas redes sociais, curtir e compartilhar fotos cria uma dinâmica de exposição. Para Jean-Paul Sartre, o 'olhar do outro' é fundamental para a construção de quem somos. Nesse ambiente, o sujeito frequentemente:",
                opcoes: [
                    "A) Alcança a liberdade absoluta, não se importando com os julgamentos estéticos alheios.",
                    "B) Modifica seu próprio comportamento para corresponder às expectativas do olhar da massa.",
                    "C) Isola-se completamente da sociedade, construindo uma identidade sem influências externas.",
                    "D) Supera a necessidade de aprovação social ao compreender a falsidade inerente das mídias."
                ], correta: 1, explicacao: "Sartre destaca que somos moldados também pelo olhar alheio. Na internet, muitos editam sua personalidade apenas para agradar esse olhar."
            },
            {
                enunciado: "15. Emmanuel Levinas defende que a ética nasce no encontro com o 'rosto do outro'. No contexto do cyberbullying, onde os ataques ocorrem através de telas e avatares anônimos, a ética de Levinas ajuda a entender que:",
                opcoes: [
                    "A) O distanciamento físico e a ausência do rosto diminuem o peso da responsabilidade moral sentida pelo agressor.",
                    "B) A agressão virtual é menos prejudicial por não atingir a integridade física do alvo atacado.",
                    "C) O anonimato potencializa a empatia, permitindo debates mais honestos e desinibidos.",
                    "D) A ausência da face física impede que o agressor sofra qualquer tipo de punição legal."
                ], correta: 0, explicacao: "Ao não ver o rosto (a expressão humana de vulnerabilidade), o indivíduo sente menos o peso da responsabilidade ética sobre suas agressões."
            },
            {
                enunciado: "16. A 'cultura do cancelamento' caracteriza-se pela exclusão pública de indivíduos que cometeram erros. Do ponto de vista da alteridade, essa prática social moderna tende a:",
                opcoes: [
                    "A) Promover a reintegração harmônica do indivíduo através do diálogo e do perdão coletivo.",
                    "B) Reduzir a complexidade humana a um único erro, apagando a possibilidade de transformação.",
                    "C) Fortalecer os laços comunitários baseados na tolerância irrestrita a qualquer comportamento.",
                    "D) Garantir o direito de defesa do acusado antes de qualquer tipo de julgamento moral público."
                ], correta: 1, explicacao: "A alteridade exige ver o outro como um ser complexo e em construção. O cancelamento o reduz a um rótulo estático e definitivo."
            },
            {
                enunciado: "17. Algoritmos mostram conteúdos que confirmam nossas crenças, criando 'bolhas virtuais'. Para uma sociedade democrática, o isolamento nessas bolhas representa um risco porque:",
                opcoes: [
                    "A) Elimina o confronto com a alteridade, enfraquecendo a capacidade de dialogar com o diferente.",
                    "B) Força os usuários a entrarem em debates constantes com pessoas de ideologias extremas.",
                    "C) Diminui o tempo de tela dos usuários, prejudicando o modelo financeiro das grandes empresas.",
                    "D) Homogeneíza o pensamento social, criando uma utopia onde todos concordam pacificamente."
                ], correta: 0, explicacao: "A democracia e a convivência dependem do diálogo com o diferente. A bolha destrói a habilidade social de exercitar a alteridade."
            },
            {
                enunciado: "18. O imperativo 'Conhece-te a ti mesmo' é um convite à reflexão interior. Na 'era dos dados', onde aplicativos monitoram sono e produtividade, o autoconhecimento corre o risco de ser:",
                opcoes: [
                    "A) Aprofundado através da união perfeita entre a meditação filosófica e a exatidão matemática.",
                    "B) Substituído por métricas externas quantificáveis, esvaziando a dimensão subjetiva do sujeito.",
                    "C) Democratizado, uma vez que as máquinas compreendem a essência humana melhor que nós.",
                    "D) Ignorado pelas novas gerações, que preferem o estudo da natureza ao invés do estudo de si."
                ], correta: 1, explicacao: "Ater-se apenas aos números de aplicativos reduz o ser humano a uma máquina de dados, esvaziando a reflexão filosófica interior profunda."
            },
            {
                enunciado: "19. Em 'O Segundo Sexo', Simone de Beauvoir afirmou: 'Não se nasce mulher, torna-se mulher'. Aplicando essa reflexão aos papéis de gênero na atualidade, entende-se que:",
                opcoes: [
                    "A) O comportamento humano é rigidamente determinado pela genética desde o momento do parto.",
                    "B) A sociedade impõe expectativas e normas que moldam a identidade do sujeito ao longo da vida.",
                    "C) A diferença salarial entre gêneros é uma consequência natural das aptidões físicas de cada um.",
                    "D) A liberdade individual é incapaz de questionar os valores morais estabelecidos pela tradição."
                ], correta: 1, explicacao: "O existencialismo feminino de Beauvoir aponta que os papéis de gênero são construções sociais impostas, e não um destino biológico."
            },
            {
                enunciado: "20. Empatia é frequentemente definida como a capacidade de se colocar no lugar do outro. Contudo, filosoficamente, entender o outro de forma plena é um desafio, pois:",
                opcoes: [
                    "A) Nossas próprias vivências e preconceitos atuam como um filtro na interpretação da dor alheia.",
                    "B) A natureza humana é essencialmente egoísta e incapaz de qualquer sentimento de solidariedade.",
                    "C) O sofrimento é uma ilusão criada pela mente que não deve ser validada pelas outras pessoas.",
                    "D) A comunicação digital extinguiu a necessidade biológica de conexão emocional com o próximo."
                ], correta: 0, explicacao: "É impossível anular totalmente nossa própria bagagem. Por isso, enxergamos a dor do outro invariavelmente através dos nossos próprios filtros."
            },
            {
                enunciado: "21. A psicanálise de Freud, ao inserir o conceito de 'inconsciente', causou uma revolução no conhecimento de si. Com Freud, compreendemos que:",
                opcoes: [
                    "A) Nossas ações são frequentemente motivadas por desejos e traumas que desconhecemos ativamente.",
                    "B) A razão humana é soberana e capaz de controlar todos os impulsos biológicos e instintos primitivos.",
                    "C) O autoconhecimento pleno é facilmente alcançado através da meditação diária e pensamento positivo.",
                    "D) Os fatores sociais são os únicos responsáveis pela formação do caráter e angústias do indivíduo."
                ], correta: 0, explicacao: "O inconsciente abalou a ideia de que o ser humano tem controle racional total sobre si. Nossas ações carregam motivos ocultos."
            },
            {
                enunciado: "22. Foucault utilizou o 'Panóptico' (prisão de vigilância invisível) para explicar a sociedade. Quando usuários de redes ajustam seu comportamento pelo medo de perderem 'seguidores', demonstram que:",
                opcoes: [
                    "A) Alcançaram o nível mais alto de autonomia e liberdade de expressão na era da informação.",

        let timerAvanco;

        const uiElements = {
            content: document.getElementById('quiz-content'),
            result: document.getElementById('result-content'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            progress: document.getElementById('progress'),
            questionCounter: document.getElementById('question-counter'),
            scoreCounter: document.getElementById('score-counter'),
            modal: document.getElementById('feedback-modal'),
            modalBox: document.getElementById('modal-box'),
            modalIcon: document.getElementById('modal-icon'),
            modalTitle: document.getElementById('modal-title'),
            modalMessage: document.getElementById('modal-message'),
            modalBtn: document.getElementById('modal-btn'),
            finalScore: document.getElementById('final-score'),
            finalMessage: document.getElementById('final-message')
        };

        function iniciarQuiz() {
            questaoAtual = 0;
            acertos = 0;
            uiElements.content.style.display = 'block';
            uiElements.result.style.display = 'none';
            carregarQuestao();
        }

        function carregarQuestao() {
            primeiraTentativa = true; 
            tempoInicioQuestao = Date.now(); // Grava o momento em que a questão apareceu na tela
            clearInterval(timerAvanco); // Limpa qualquer timer residual
            
            const q = questoes[questaoAtual];
            uiElements.questionText.textContent = q.enunciado;
            uiElements.optionsContainer.innerHTML = '';
            
            const progressoPct = ((questaoAtual) / questoes.length) * 100;
            uiElements.progress.style.width = `${progressoPct}%`;
            uiElements.questionCounter.textContent = `Questão ${questaoAtual + 1} de ${questoes.length}`;
            uiElements.scoreCounter.textContent = `Acertos (1ª tentativa): ${acertos}`;

            q.opcoes.forEach((opcao, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opcao;
                btn.onclick = () => verificarResposta(index);
                uiElements.optionsContainer.appendChild(btn);
            });
        }

        function verificarResposta(indiceSelecionado) {
            const q = questoes[questaoAtual];
            const acertou = (indiceSelecionado === q.correta);

            if (acertou) {
                if (primeiraTentativa) {
                    acertos++;
                    uiElements.scoreCounter.textContent = `Acertos (1ª tentativa): ${acertos}`;
                }
                mostrarModal(true, q.explicacao);
            } else {
                primeiraTentativa = false; 
                const msgErro = `A resposta correta não é essa. Tente novamente!<br><br><strong>Dica da Explicação:</strong> ${q.explicacao}`;
                mostrarModal(false, msgErro);
            }
        }

        function mostrarModal(acertou, mensagem) {
            uiElements.modal.style.display = 'flex';
            clearInterval(timerAvanco); 
            
            if (acertou) {
                uiElements.modalBox.className = 'modal-content correct-theme';
                uiElements.modalIcon.textContent = '✓';
                uiElements.modalTitle.textContent = 'Você Acertou!';
                uiElements.modalMessage.innerHTML = mensagem;
                
                // Calcula quanto tempo passou desde que a questão carregou
                let tempoDecorrido = Math.floor((Date.now() - tempoInicioQuestao) / 1000);
                let tempoRestante = 15 - tempoDecorrido;

                if (tempoRestante > 0) {
                    uiElements.modalBtn.disabled = true;
                    uiElements.modalBtn.textContent = `Aguarde (${tempoRestante}s)`;
                    uiElements.modalBtn.onclick = null;
                    
                    timerAvanco = setInterval(() => {
                        tempoRestante--;
                        if (tempoRestante > 0) {
                            uiElements.modalBtn.textContent = `Aguarde (${tempoRestante}s)`;
                        } else {
                            clearInterval(timerAvanco);
                            uiElements.modalBtn.disabled = false;
                            uiElements.modalBtn.textContent = "Próxima Questão";
                            uiElements.modalBtn.onclick = avancarQuestao;
                        }
                    }, 1000);
                } else {
                    // Já passou de 15s desde que a questão carregou
                    uiElements.modalBtn.disabled = false;
                    uiElements.modalBtn.textContent = "Próxima Questão";
                    uiElements.modalBtn.onclick = avancarQuestao;
                }

            } else {
                uiElements.modalBox.className = 'modal-content wrong-theme';
                uiElements.modalIcon.textContent = '✗';
                uiElements.modalTitle.textContent = 'Resposta Incorreta';
                uiElements.modalMessage.innerHTML = mensagem;
                
                // Erro: permite tentar novamente de imediato para não prender o aluno na tela de erro
                uiElements.modalBtn.disabled = false;
                uiElements.modalBtn.textContent = "Tentar Novamente";
                uiElements.modalBtn.onclick = tentarNovamente;
            }
        }

        function tentarNovamente() {
            uiElements.modal.style.display = 'none';
        }

        function avancarQuestao() {
            uiElements.modal.style.display = 'none';
            questaoAtual++;

            if (questaoAtual < questoes.length) {
                carregarQuestao();
            } else {
                mostrarResultado();
            }
        }

        function mostrarResultado() {
            uiElements.content.style.display = 'none';
            uiElements.result.style.display = 'block';
            
            const porcentagem = Math.round((acertos / questoes.length) * 100);
            uiElements.finalScore.textContent = `${porcentagem}%`;
            
            let mensagem = "";
            if (porcentagem >= 80) mensagem = "Excelente! Você demonstrou foco e leitura atenta acertando várias questões de primeira.";
            else if (porcentagem >= 50) mensagem = "Bom trabalho! Continue testando seus conhecimentos filosóficos.";
            else mensagem = "O mais importante foi ler as explicações com calma. O conhecimento leva tempo para construir!";
            
            uiElements.finalMessage.textContent = mensagem;
        }

        function reiniciarQuiz() {
            iniciarQuiz();
        }

        window.onload = iniciarQuiz;
    </script>
</body>
</html>
